name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ai_receptionist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff

      - name: Lint with Ruff
        run: |
          ruff check backend/ tests/
          ruff format --check backend/ tests/

      - name: Run tests with PostgreSQL
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ai_receptionist_test
          SECRET_KEY: test-secret-key-32-chars-long!!
          ADMIN_PASSWORD: testpass123
          VAPI_API_KEY: test_vapi_key
          VAPI_WEBHOOK_SECRET: test_webhook_secret
          TWILIO_ACCOUNT_SID: test_twilio_sid
          TWILIO_AUTH_TOKEN: test_twilio_token
          TWILIO_PHONE_NUMBER: +1234567890
          EMERGENCY_PHONE_NUMBER: +9999999999
        run: |
          pytest tests/ -v --cov=backend --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Security scan with pip-audit
        run: |
          pip install pip-audit
          pip-audit --desc

  build-dashboard:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate dashboard HTML
        run: |
          pip install html5lib
          python -c "import html5lib; html5lib.parse(open('dashboard/index.html').read())"

      - name: Check CSS validity
        run: |
          pip install cssutils
          python -c "import cssutils; cssutils.parseFile('dashboard/style.css')"

      - name: Deploy dashboard to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
