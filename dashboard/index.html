<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Receptionist — Enterprise Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-wall" style="display:flex;position:fixed;inset:0;background:#0f172a;z-index:50;align-items:center;justify-content:center;">
        <div style="background:#1e293b;padding:2rem;border-radius:1rem;max-width:400px;width:90%;">
            <h2>🤖 AI Receptionist</h2>
            <p>Real-time call analytics & appointment tracking</p>
            <input id="login-user" type="text" placeholder="Username" style="width:100%;margin:0.5rem 0;padding:0.75rem;">
            <input id="login-pass" type="password" placeholder="Password" style="width:100%;margin:0.5rem 0;padding:0.75rem;">
            <button onclick="doLogin()" style="width:100%;padding:0.75rem;background:#3b82f6;color:white;border:none;border-radius:0.5rem;cursor:pointer;">Login</button>
            <div id="login-error" style="display:none;color:#ef4444;margin-top:0.5rem;">Invalid credentials</div>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>🤖 AI Receptionist</h1>
            <p>Real-time call analytics & appointment tracking</p>
            <button onclick="logout()" style="float:right;">Logout</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>📞 Total Calls</h3>
                <div class="stat-value" id="stat-total">0</div>
            </div>
            <div class="stat-card">
                <h3>✅ Booked</h3>
                <div class="stat-value" id="stat-booked">0</div>
            </div>
            <div class="stat-card">
                <h3>❌ Missed</h3>
                <div class="stat-value" id="stat-missed">0</div>
            </div>
            <div class="stat-card">
                <h3>⏱️ Avg Duration</h3>
                <div class="stat-value" id="stat-duration">0s</div>
            </div>
        </div>

        <div class="filters">
            <input id="filter-phone" type="text" placeholder="Filter by phone...">
            <select id="filter-status">
                <option value="">All statuses</option>
                <option value="completed">Completed</option>
                <option value="no-answer">No answer</option>
                <option value="transferred">Transferred</option>
            </select>
            <button onclick="loadCalls()">Filter</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Duration</th>
                    <th>Appointment</th>
                    <th>Emergency</th>
                </tr>
            </thead>
            <tbody id="calls-body">
                <tr><td colspan="6">Loading...</td></tr>
            </tbody>
        </table>

        <p id="last-updated" style="text-align:center;color:#94a3b8;margin-top:1rem;">Last updated: —</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
