services:
  - type: web
    name: ai-receptionist-api
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-receptionist-db
          property: connectionString
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_WEBHOOK_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: TIMEZONE
        value: Asia/Dubai
      - key: DASHBOARD_ORIGIN
        value: https://your-username.github.io
      - key: SENTRY_DSN
        sync: false

databases:
  - name: ai-receptionist-db
    plan: starter
    ipAllowList: []