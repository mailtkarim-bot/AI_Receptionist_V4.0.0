services:
  - type: web
    name: ai-receptionist-api
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "gunicorn backend.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:10000 --timeout 60"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-receptionist-db
          property: connectionString
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_WEBHOOK_SECRET
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_CALENDAR_ID
        sync: false
      - key: TIMEZONE
        value: Asia/Dubai
      - key: DASHBOARD_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: EMERGENCY_PHONE_NUMBER
        sync: false
      - key: QUIET_HOURS_START
        value: "21"
      - key: QUIET_HOURS_END
        value: "8"
      - key: RETENTION_CALLS_DAYS
        value: "730"
      - key: RETENTION_AUDIT_DAYS
        value: "365"
      - key: RETENTION_SMS_QUEUE_DAYS
        value: "30"

databases:
  - name: ai-receptionist-db
    plan: starter
    ipAllowList: []
